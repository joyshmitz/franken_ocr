name: Performance Gauntlet

on:
  workflow_dispatch:
    inputs:
      subject_model:
        description: Absolute path to the pinned conservative Unlimited-OCR .focrq
        required: true
        type: string
      reference_model_dir:
        description: Absolute path to the pinned 12-file BF16 reference model
        required: true
        type: string
      pages_dir:
        description: Absolute path containing pinned page_0009.png and page_0014.png
        required: true
        type: string
      venv_python:
        description: Absolute path to Python with torch 2.10.0 and transformers 4.57.1
        required: true
        type: string
      scratch_root:
        description: Absolute RCH/Cargo scratch directory
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-07-09
  FRANKENTORCH_REV: 062cf3671c194f6ab184da98f0559ebc76cff7c7
  FRANKENSQLITE_REV: cd9990bb16291d8c7c247b75b47faae8d7701adb
  ASUPERSYNC_REV: 53aa5c72f855352148c3a88e6961f7f09adb535c

jobs:
  weighted-performance-gauntlet:
    name: weighted-performance-gauntlet
    runs-on: [self-hosted, macOS, ARM64, focr-gauntlet]
    timeout-minutes: 480
    steps:
      - name: Checkout final source HEAD
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Set up Python for evidence receipts
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Require current main HEAD
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/heads/main" ]]
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          [[ "$(git rev-parse HEAD)" == "$(git rev-parse refs/remotes/origin/main)" ]]

      - name: Verify pinned sibling and tool closure
        shell: bash
        run: |
          set -euo pipefail
          parent=$(dirname "$GITHUB_WORKSPACE")
          verify_or_fetch() {
            repo=$1
            revision=$2
            destination="$parent/$repo"
            if [[ ! -d "$destination/.git" ]]; then
              git init --quiet "$destination"
              git -C "$destination" remote add origin "https://github.com/Dicklesworthstone/$repo.git"
              git -C "$destination" fetch --quiet --depth 1 origin "$revision"
              git -C "$destination" checkout --quiet --detach FETCH_HEAD
            else
              [[ -z "$(git -C "$destination" status --porcelain=v1 --untracked-files=all)" ]] || {
                echo "$repo checkout is dirty: $destination" >&2
                exit 1
              }
              if [[ "$(git -C "$destination" rev-parse HEAD)" != "$revision" ]]; then
                git -C "$destination" fetch --quiet --depth 1 origin "$revision"
                git -C "$destination" checkout --quiet --detach FETCH_HEAD
              fi
            fi
            actual=$(git -C "$destination" rev-parse HEAD)
            [[ "$actual" == "$revision" ]] || {
              echo "$repo checkout mismatch: expected $revision, got $actual" >&2
              exit 1
            }
            [[ -z "$(git -C "$destination" status --porcelain=v1 --untracked-files=all)" ]] || {
              echo "$repo checkout is dirty: $destination" >&2
              exit 1
            }
          }
          verify_or_fetch frankentorch "$FRANKENTORCH_REV"
          verify_or_fetch frankensqlite "$FRANKENSQLITE_REV"
          verify_or_fetch asupersync "$ASUPERSYNC_REV"
          command -v rch >/dev/null
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || {
            echo "source checkout is dirty before performance capture" >&2
            exit 1
          }

      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Run the real quiet-host performance producer
        shell: bash
        env:
          FOCR_GAUNTLET_FOCR_MODEL: ${{ inputs.subject_model }}
          FOCR_GAUNTLET_REFERENCE_MODEL_DIR: ${{ inputs.reference_model_dir }}
          FOCR_GAUNTLET_PAGES_DIR: ${{ inputs.pages_dir }}
          FOCR_GAUNTLET_VENV_PY: ${{ inputs.venv_python }}
          FOCR_GAUNTLET_SCRATCH_ROOT: ${{ inputs.scratch_root }}
          OUT_DIR: artifacts/perf/ci-${{ github.run_id }}
          VERIFY_SHARD: "1"
        run: |
          set -euo pipefail
          test -f "$FOCR_GAUNTLET_FOCR_MODEL"
          test -d "$FOCR_GAUNTLET_REFERENCE_MODEL_DIR"
          test -d "$FOCR_GAUNTLET_PAGES_DIR"
          test -x "$FOCR_GAUNTLET_VENV_PY"
          test -d "$FOCR_GAUNTLET_SCRATCH_ROOT"
          scripts/gauntlet_runbook.sh all
          python3 scripts/gauntlet_cert.py \
            --performance-evidence "$OUT_DIR" \
            --workflow-artifact-name weighted-performance-${{ github.run_id }}

      - name: Upload reconstructable performance evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: weighted-performance-${{ github.run_id }}
          path: |
            .gauntlet-output/performance-workflow-evidence.json
            .gauntlet-output/bundle/benchmark_inputs/**
            artifacts/perf/ci-${{ github.run_id }}/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
