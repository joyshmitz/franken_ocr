name: Model Parity

on:
  workflow_dispatch:
    inputs:
      model_path:
        description: Absolute path to the pinned conservative Unlimited-OCR .focrq
        required: true
        type: string
      fixtures_dir:
        description: Absolute path to the pinned native oracle fixture directory
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-07-09
  FRANKENTORCH_REV: f00c3ce79737ffd0e7c7e2f2e81540907ce26562
  FRANKENSQLITE_REV: 14c5781680833c248ed18d84914312e233d145df
  ASUPERSYNC_REV: a9b99549609b39bc1dd8b128591ef324d6ef2d71

jobs:
  weighted-model-parity:
    name: weighted-model-parity
    runs-on: [self-hosted, macOS, ARM64, focr-gauntlet]
    timeout-minutes: 240
    steps:
      - name: Checkout final source HEAD
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          clean: true

      - name: Set up Python for evidence receipts
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Require current main HEAD
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/heads/main" ]]
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          [[ "$(git rev-parse HEAD)" == "$(git rev-parse refs/remotes/origin/main)" ]]

      - name: Verify pinned sibling closure
        shell: bash
        run: |
          set -euo pipefail
          parent=$(dirname "$GITHUB_WORKSPACE")
          verify_or_fetch() {
            repo=$1
            revision=$2
            destination="$parent/$repo"
            if [[ ! -d "$destination/.git" ]]; then
              git init --quiet "$destination"
              git -C "$destination" remote add origin "https://github.com/Dicklesworthstone/$repo.git"
              git -C "$destination" fetch --quiet --depth 1 origin "$revision"
              git -C "$destination" checkout --quiet --detach FETCH_HEAD
            fi
            actual=$(git -C "$destination" rev-parse HEAD)
            [[ "$actual" == "$revision" ]] || {
              echo "$repo checkout mismatch: expected $revision, got $actual" >&2
              exit 1
            }
            [[ -z "$(git -C "$destination" status --porcelain=v1 --untracked-files=all)" ]] || {
              echo "$repo checkout is dirty: $destination" >&2
              exit 1
            }
          }
          verify_or_fetch frankentorch "$FRANKENTORCH_REV"
          verify_or_fetch frankensqlite "$FRANKENSQLITE_REV"
          [[ -d /dp/asupersync/.git ]] || { echo "/dp/asupersync is missing" >&2; exit 1; }
          [[ "$(git -C /dp/asupersync rev-parse HEAD)" == "$ASUPERSYNC_REV" ]] || {
            echo "/dp/asupersync is not at the pinned revision" >&2
            exit 1
          }
          [[ -z "$(git -C /dp/asupersync status --porcelain=v1 --untracked-files=all)" ]] || {
            echo "/dp/asupersync is dirty" >&2
            exit 1
          }
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || {
            echo "source checkout is dirty before weighted parity" >&2
            exit 1
          }

      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Run the real weighted L0-L5 ladder
        shell: bash
        env:
          FOCR_MODEL_PATH: ${{ inputs.model_path }}
          FOCR_FIXTURES_DIR: ${{ inputs.fixtures_dir }}
        run: |
          set -euo pipefail
          test -f "$FOCR_MODEL_PATH"
          test -d "$FOCR_FIXTURES_DIR"
          mkdir -p .gauntlet-output/bundle/model_parity
          scripts/ladder_scorecard.sh \
            --out .gauntlet-output/bundle/model_parity/scorecard_armed.json
          python3 scripts/gauntlet_cert.py \
            --model-parity-evidence \
            .gauntlet-output/bundle/model_parity/scorecard_armed.json \
            --model-parity-raw \
            .gauntlet-output/bundle/model_parity/scorecard_armed.raw.ndjson \
            --model-parity-fixtures "$FOCR_FIXTURES_DIR" \
            --workflow-artifact-name weighted-model-parity-${{ github.run_id }}

      - name: Upload reconstructable weighted evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: weighted-model-parity-${{ github.run_id }}
          path: |
            .gauntlet-output/model-parity-workflow-evidence.json
            .gauntlet-output/bundle/model_parity_receipt.json
            .gauntlet-output/bundle/model_parity/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
