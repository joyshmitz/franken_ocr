# franken_ocr — Continuous Integration
#
# The SINGLE test job is `scripts/check.sh` (the one-command gate). We invoke the
# script rather than re-listing its steps so it stays the single source of truth
# (AGENTS.md "Mandatory Checks": fmt --check → check --all-targets →
# clippy -D warnings → test, preceded by the Python ledger/format self-tests). If
# the gate sequence ever changes, it changes in ONE place — the script — and CI
# follows automatically.
#
# Toolchain: `rust-toolchain.toml` selects the nightly channel (nightly is
# REQUIRED for stdarch i8mm/dotprod intrinsics + portable_simd — Toolchain note).
# The `dtolnay/rust-toolchain@nightly` action installs that same channel plus the
# needed components/targets, so CI and local builds stay aligned.
#
# Path dependencies: franken_ocr currently consumes sibling checkouts at
# `../frankentorch`, `../frankensqlite`, and a host-local `/dp/asupersync`.
# Fresh GitHub runners do not have those paths, and hosted macOS has a read-only
# root filesystem, so each Cargo job clones the siblings and rewrites the CI-only
# `/dp/asupersync` paths in this checkout and the cloned `frankensqlite` root to
# the sibling `../asupersync` checkout.
#
# Model gating: CI runs WITHOUT the 6.67 GB weights. The model-gated e2e/parity
# tests resolve `FOCR_MODEL_PATH` (default `models/unlimited-ocr.focrq`, absent
# here) and skip-with-SUCCESS — they print a SUCCESS line and pass rather than
# fail. So a green CI run exercises everything that does NOT require weights; the
# weighted parity ladder (L3–L5) is proven out-of-band against the oracle.
#
# Branch policy (AGENTS.md): primary branch is `main`; `master` is never used.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; a newer push cancels the older one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Surface full backtraces if a test panics, so failures are self-diagnosing.
  RUST_BACKTRACE: 1

jobs:
  gate:
    name: gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS-15 is Apple Silicon (aarch64) — exercises the NEON/SDOT/SMMLA
        # scalar-fallback compile path; ubuntu-latest is x86_64 (AVX2/VNNI).
        # Both must stay green: the kernels carry per-arch scalar fallbacks.
        os: [macos-15, ubuntu-latest]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision sibling path dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $parent = Split-Path -Parent $env:GITHUB_WORKSPACE
          git clone --depth 1 https://github.com/Dicklesworthstone/frankentorch.git (Join-Path $parent "frankentorch")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git (Join-Path $parent "frankensqlite")
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git (Join-Path $parent "asupersync")

          function Rewrite-AsupersyncPath([string] $cargoToml, [bool] $required) {
            $text = Get-Content -Raw -Path $cargoToml
            $needle = 'path = "/dp/asupersync"'
            if (-not $text.Contains($needle)) {
              if ($required) {
                throw "expected $cargoToml to contain $needle before CI path rewrite"
              }
              # frankensqlite migrated to a crates.io asupersync dep
              # (asupersync = "0.3.5", no path) — nothing to rewrite; the
              # root [patch.crates-io] (rewritten above) unifies its graph.
              Write-Host "skip: $cargoToml has no /dp/asupersync path dep (crates.io dep; patch covers it)"
              return
            }
            [System.IO.File]::WriteAllText($cargoToml, $text.Replace($needle, 'path = "../asupersync"'))
          }
          Rewrite-AsupersyncPath (Join-Path $env:GITHUB_WORKSPACE "Cargo.toml") $true
          Rewrite-AsupersyncPath (Join-Path (Join-Path $parent "frankensqlite") "Cargo.toml") $false

      # Python 3 is needed by the pre-cargo ledger/format/oracle self-tests that
      # `scripts/check.sh` runs first (stdlib only — no pip install required).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the repo's nightly channel plus the components declared for the
      # local gate.
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache per OS so the aarch64 and x86_64 artifacts never mix.
          key: ${{ matrix.os }}
          # The script builds --all-targets (lib, both bins, tests); cache them.
          cache-all-crates: true

      # gum gives the installer e2e (tests/installer_e2e.sh, run by check.sh) its
      # teeth: its gum/TTY render gates SKIP without gum, so install it here on
      # both runners (Homebrew ships on macOS and ubuntu-latest). Best-effort — a
      # transient install hiccup must not fail the gate; the test then just skips.
      - name: Install gum (installer e2e render path)
        run: brew install gum || echo "gum install failed; installer e2e gum gates will skip"

      # The one and only test step: the same gate humans run locally. We do NOT
      # duplicate its commands here — the script is the single source of truth.
      - name: Run the gate (scripts/check.sh)
        run: ./scripts/check.sh

  advisory-targets:
    name: advisory target (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            runnable: true
            skip: false
            skip_reason: ""
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            runnable: true
            skip: false
            skip_reason: ""
          - name: darwin-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            runnable: true
            skip: false
            skip_reason: ""
          - name: darwin-arm64
            os: macos-15
            target: aarch64-apple-darwin
            runnable: true
            skip: false
            skip_reason: ""
          - name: windows-msvc-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            runnable: true
            skip: false
            skip_reason: ""
          # arm64 Windows checks natively on the hosted windows-11-arm runner
          # (available to public repos); advisory only — continue-on-error above
          # keeps the not-yet-proven arm64 stack (bd-3u97/bd-1aj1) from blocking
          # the gate while dist.yml ships its artifact.
          - name: windows-msvc-aarch64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            runnable: true
            skip: false
            skip_reason: ""
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Explain advisory skip
        if: ${{ matrix.skip }}
        shell: bash
        run: |
          echo "Advisory target '${{ matrix.name }}' is not built in Phase 0:"
          echo "${{ matrix.skip_reason }}"

      - name: Provision sibling path dependencies
        if: ${{ !matrix.skip }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $parent = Split-Path -Parent $env:GITHUB_WORKSPACE
          git clone --depth 1 https://github.com/Dicklesworthstone/frankentorch.git (Join-Path $parent "frankentorch")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git (Join-Path $parent "frankensqlite")
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git (Join-Path $parent "asupersync")

          function Rewrite-AsupersyncPath([string] $cargoToml, [bool] $required) {
            $text = Get-Content -Raw -Path $cargoToml
            $needle = 'path = "/dp/asupersync"'
            if (-not $text.Contains($needle)) {
              if ($required) {
                throw "expected $cargoToml to contain $needle before CI path rewrite"
              }
              # frankensqlite migrated to a crates.io asupersync dep
              # (asupersync = "0.3.5", no path) — nothing to rewrite; the
              # root [patch.crates-io] (rewritten above) unifies its graph.
              Write-Host "skip: $cargoToml has no /dp/asupersync path dep (crates.io dep; patch covers it)"
              return
            }
            [System.IO.File]::WriteAllText($cargoToml, $text.Replace($needle, 'path = "../asupersync"'))
          }
          Rewrite-AsupersyncPath (Join-Path $env:GITHUB_WORKSPACE "Cargo.toml") $true
          Rewrite-AsupersyncPath (Join-Path (Join-Path $parent "frankensqlite") "Cargo.toml") $false

      - name: Install nightly toolchain
        if: ${{ !matrix.skip }}
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        if: ${{ !matrix.skip }}
        uses: Swatinem/rust-cache@v2
        with:
          key: advisory-${{ matrix.name }}-${{ matrix.target }}
          cache-all-crates: true

      - name: Cargo check target
        if: ${{ !matrix.skip }}
        run: cargo check --target ${{ matrix.target }} --all-targets

      - name: Build focr target
        if: ${{ !matrix.skip }}
        run: cargo build --target ${{ matrix.target }} --bin focr

      - name: Run target lib tests where executable
        if: ${{ !matrix.skip && matrix.runnable }}
        run: cargo test --target ${{ matrix.target }} --lib
