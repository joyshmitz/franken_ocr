# Every TOP-LEVEL entry under tests/fixtures/ must be declared here; the
# validator (scripts/check_fixture_manifest.py, wired into scripts/check.sh)
# fails on an undeclared entry or a declared-but-missing one. Kinds:
#   committed             — frozen in git; byte changes are reviewed golden changes
#   regenerated-committed — produced by the named pinned script, then committed;
#                           changes only via rerunning the generator
# The prose catalogue + weights-gated (off-tree) families: PROVENANCE.md.

